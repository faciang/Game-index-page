<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好法遊戲區</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16141f;
    --ink-2:#1f1c2b;
    --ink-3:#282540;
    --paper:#f4f0e6;
    --muted:#9a93b8;
    --line:rgba(255,255,255,.09);
    --amber:#ffc94d;
    --amber-deep:#ff9f1c;
    --radius:16px;
    --sans:"Noto Sans TC",system-ui,sans-serif;
    --mono:"Space Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    background:var(--ink);
    background-image:
      radial-gradient(1200px 600px at 50% -240px, rgba(255,201,77,.10), transparent 60%),
      radial-gradient(900px 500px at 100% 120%, rgba(155,93,229,.08), transparent 55%);
    color:var(--paper);
    font-family:var(--sans);
    line-height:1.6;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:clamp(20px,4vw,44px) clamp(16px,4vw,28px) 72px}

  /* ---------- 街機招牌 marquee ---------- */
  .marquee{
    position:relative;
    border:1px solid var(--line);
    border-radius:22px;
    background:linear-gradient(180deg,var(--ink-2),var(--ink));
    padding:clamp(26px,5vw,44px) clamp(20px,4vw,40px);
    text-align:center;
    overflow:hidden;
  }
  .marquee::before,.marquee::after{
    content:"";position:absolute;left:14px;right:14px;height:10px;
    background:radial-gradient(circle at 6px 5px, var(--amber) 0 2.6px, transparent 3px);
    background-size:22px 10px;background-repeat:repeat-x;
    opacity:.85;filter:drop-shadow(0 0 4px rgba(255,201,77,.6));
    animation:blink 1.8s steps(2) infinite;
  }
  .marquee::before{top:12px}
  .marquee::after{bottom:12px}
  @keyframes blink{50%{opacity:.35}}
  .eyebrow{
    font-family:var(--mono);font-size:12px;letter-spacing:.28em;
    color:var(--amber);text-transform:uppercase;margin:0 0 10px;
  }
  .title{
    margin:0;
    font-weight:900;
    font-size:clamp(38px,9vw,74px);
    letter-spacing:.04em;
    line-height:1;
    color:var(--paper);
    text-shadow:0 0 18px rgba(255,201,77,.35),0 3px 0 rgba(0,0,0,.4);
  }
  .tagline{margin:14px auto 0;max-width:36ch;color:var(--muted);font-size:15px}
  .marquee-link{
    display:inline-flex;align-items:center;gap:7px;margin-top:18px;
    font-family:var(--mono);font-size:13px;text-decoration:none;font-weight:700;
    color:#20180a;background:var(--amber);padding:9px 17px;border-radius:999px;
    transition:transform .15s ease,box-shadow .15s ease;
  }
  .marquee-link:hover{transform:translateY(-2px);box-shadow:0 8px 22px -8px rgba(255,201,77,.7)}
  .marquee-link:focus-visible{outline:2px solid var(--paper);outline-offset:2px}

  /* ---------- 控制列 ---------- */
  .bar{
    display:flex;flex-wrap:wrap;gap:12px;align-items:center;
    margin:26px 0 14px;
  }
  .search{
    flex:1 1 240px;position:relative;min-width:0;
  }
  .search input{
    width:100%;padding:12px 14px 12px 40px;
    background:var(--ink-2);border:1px solid var(--line);border-radius:12px;
    color:var(--paper);font-family:var(--sans);font-size:15px;
  }
  .search input::placeholder{color:var(--muted)}
  .search input:focus-visible{outline:2px solid var(--amber);outline-offset:1px;border-color:transparent}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted)}
  .count{
    font-family:var(--mono);font-size:13px;color:var(--muted);
    background:var(--ink-2);border:1px solid var(--line);
    padding:9px 13px;border-radius:12px;white-space:nowrap;
  }
  .count b{color:var(--amber)}
  .sort{display:flex;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:3px}
  .sort button{
    border:0;background:transparent;color:var(--muted);cursor:pointer;
    font-family:var(--sans);font-size:13px;padding:7px 12px;border-radius:9px;
  }
  .sort button[aria-pressed="true"]{background:var(--amber);color:#20180a;font-weight:700}
  .sort button:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  /* ---------- 標籤 chips ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 22px}
  .chip{
    border:1px solid var(--line);background:var(--ink-2);color:var(--muted);
    font-family:var(--sans);font-size:13px;padding:6px 13px;border-radius:999px;cursor:pointer;
  }
  .chip[aria-pressed="true"]{border-color:var(--amber);color:var(--amber);background:rgba(255,201,77,.10)}
  .chip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  /* ---------- 卡帶 grid ---------- */
  .grid{
    display:grid;gap:16px;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  }
  .card{
    position:relative;
    background:var(--ink-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;
    animation:pop .4s both;
  }
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card:hover,.card:focus-within{
    transform:translateY(-4px);
    border-color:color-mix(in srgb,var(--c) 60%,transparent);
    box-shadow:0 14px 30px -12px color-mix(in srgb,var(--c) 55%,transparent);
  }
  .card__art{
    height:118px;display:flex;align-items:center;justify-content:center;
    font-size:52px;line-height:1;
    background:
      radial-gradient(120% 120% at 20% 0%, color-mix(in srgb,var(--c) 42%,transparent), transparent 60%),
      color-mix(in srgb,var(--c) 16%,var(--ink-3));
    border-bottom:1px solid var(--line);
  }
  .card__art span{filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));transition:transform .2s ease}
  .card:hover .card__art span{transform:scale(1.12) rotate(-4deg)}
  .card__body{padding:14px 15px 16px}
  .card__name{margin:0;font-size:17px;font-weight:700;letter-spacing:.01em}
  .card__link::after{content:"";position:absolute;inset:0}
  .card__link{color:inherit;text-decoration:none}
  .card__desc{margin:6px 0 0;font-size:13.5px;color:var(--muted);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card__meta{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
  .card__date{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .card__tags{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
  .card__tag{font-size:11px;color:var(--muted);border:1px solid var(--line);padding:2px 8px;border-radius:999px}
  .badge{
    position:absolute;top:10px;right:10px;z-index:2;
    font-family:var(--mono);font-weight:700;font-size:10.5px;letter-spacing:.14em;
    background:var(--amber);color:#20180a;padding:3px 8px;border-radius:7px;
    box-shadow:0 0 0 3px rgba(255,201,77,.18);
  }
  .threads{
    position:relative;z-index:3;display:inline-flex;align-items:center;gap:4px;
    font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;
    border:1px solid var(--line);padding:3px 9px;border-radius:999px;
  }
  .threads:hover{color:var(--paper);border-color:var(--muted)}
  .card:focus-within{outline:none}
  .card__link:focus-visible::after{outline:2px solid var(--amber);outline-offset:-2px;border-radius:var(--radius)}

  /* ---------- 空狀態 ---------- */
  .empty{
    grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--muted);
    border:1px dashed var(--line);border-radius:var(--radius);
  }
  .empty p{margin:0 0 14px;font-size:15px}
  .empty button{
    background:var(--amber);color:#20180a;border:0;font-weight:700;font-family:var(--sans);
    padding:9px 18px;border-radius:10px;cursor:pointer;
  }

  footer{margin-top:44px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px}
  footer a{color:var(--amber);text-decoration:none}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
  <main class="wrap">
    <header class="marquee">
      <p class="eyebrow">▸ Insert Coin · Select a Game</p>
      <h1 class="title">好法遊戲區</h1>
      <!-- 改這行成你自己的介紹 -->
      <p class="tagline">把我丟在 Threads 上的小遊戲全收在這，隨時回來玩。</p>
      <a class="marquee-link" href="https://www.threads.com/@faciang5566" target="_blank" rel="noopener">＠faciang5566 · 追蹤我的 Threads ↗</a>
    </header>

    <div class="bar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="搜尋遊戲名稱、標籤…" aria-label="搜尋遊戲">
      </div>
      <div class="sort" role="group" aria-label="排序方式">
        <button data-sort="new" aria-pressed="true">最新</button>
        <button data-sort="old" aria-pressed="false">最舊</button>
        <button data-sort="name" aria-pressed="false">名稱</button>
      </div>
      <div class="count">共 <b id="count">0</b> 款</div>
    </div>

    <div class="chips" id="chips" role="group" aria-label="標籤篩選"></div>

    <section class="grid" id="grid" aria-live="polite"></section>

    <footer>好法遊戲區 · made with ♥ on GitHub Pages</footer>
  </main>

<script>
/* ================================================================
   ⬇⬇⬇  你只要改這裡：每做一個新遊戲，就在最上面加一筆  ⬇⬇⬇
   欄位說明：
     title   遊戲名稱（必填）
     emoji   卡帶上的圖示，任何 emoji 都行（必填）
     desc    一句話介紹
     date    發布日期 "YYYY-MM-DD"，用來排序，最新的會亮 NEW
     tags    分類標籤陣列，可留空 []
     url     遊戲網址，相對路徑（games/xxx.html）或完整網址都可
     threads 對應的 Threads 貼文網址，可省略
     color   想指定卡帶顏色再加這欄（如 "#ff6b6b"），不填會自動配色
   ================================================================ */
const GAMES = [
  { title:"工作損失與勞動力減損計算器", emoji:"🧮", desc:"計算不能工作損失與勞動能力減損金額，並以霍夫曼方式扣除中間利息。", date:"2026-07-19", tags:["計算器","民事","求償"], url:"https://faciang.github.io/Hofman/", threads:"" },
  { title:"司法官第一試戰鬥RPG", emoji:"⚔️", desc:"一邊戰鬥、一邊挑戰司法官第一試題目，答錯就會陷入危機。", date:"2026-07-17", tags:["測驗","RPG","法律"], url:"https://faciang.github.io/law-test-rpg/", threads:"" },
  { title:"法庭大冒險－菜鳥律師的逆襲", emoji:"⚖️", desc:"扮演菜鳥律師闖進法庭，蒐證、詰問、逆轉勝。目前更新至第二關。", date:"2026-07-15", tags:["冒險","劇情"], url:"https://faciang.github.io/court-game-2/", threads:"" },
  { title:"法庭格鬥 Court-Fighter", emoji:"🥊", desc:"把法庭變擂台，律師互毆的荒謬格鬥遊戲。", date:"2026-06-20", tags:["格鬥","動作"], url:"https://faciang.github.io/court-fighter/", threads:"" },
];
/* ⬆⬆⬆  上面加完存檔、推上 GitHub 就好，其他都自動  ⬆⬆⬆ */

const PALETTE = ["#ff6b6b","#22b8a6","#9b5de5","#4cc9f0","#9bd831","#ff70a6","#ff9e3d","#5c8dff"];
const hueFor = s => PALETTE[[...s].reduce((a,c)=>a+c.charCodeAt(0),0) % PALETTE.length];

// 找出最新日期，用來標記 NEW
const newest = GAMES.reduce((m,g)=> g.date > m ? g.date : m, "");

const state = { q:"", tag:"all", sort:"new" };
const $ = s => document.querySelector(s);
const grid = $("#grid"), chips = $("#chips"), countEl = $("#count");
const esc = s => (s??"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// 建立標籤列
const allTags = [...new Set(GAMES.flatMap(g => g.tags || []))].sort();
chips.innerHTML = ['<button class="chip" data-tag="all" aria-pressed="true">全部</button>']
  .concat(allTags.map(t => `<button class="chip" data-tag="${esc(t)}" aria-pressed="false">${esc(t)}</button>`))
  .join("");

function sortGames(list){
  const by = {
    new:  (a,b) => (b.date||"").localeCompare(a.date||""),
    old:  (a,b) => (a.date||"").localeCompare(b.date||""),
    name: (a,b) => a.title.localeCompare(b.title,"zh-Hant"),
  }[state.sort];
  return [...list].sort(by);
}

function render(){
  const q = state.q.trim().toLowerCase();
  let list = GAMES.filter(g => {
    const tagOk = state.tag === "all" || (g.tags||[]).includes(state.tag);
    const hay = (g.title + " " + (g.desc||"") + " " + (g.tags||[]).join(" ")).toLowerCase();
    return tagOk && (!q || hay.includes(q));
  });
  list = sortGames(list);
  countEl.textContent = list.length;

  if(!list.length){
    grid.innerHTML = `<div class="empty"><p>找不到符合的遊戲 — 換個關鍵字試試？</p><button id="reset">清除篩選</button></div>`;
    $("#reset").onclick = () => { state.q=""; state.tag="all"; $("#search").value="";
      document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", c.dataset.tag==="all"));
      render(); };
    return;
  }

  grid.innerHTML = list.map((g,i) => {
    const c = g.color || hueFor(g.title);
    const isNew = g.date && g.date === newest;
    const tags = (g.tags||[]).map(t => `<span class="card__tag">${esc(t)}</span>`).join("");
    const threads = g.threads ? `<a class="threads" href="${esc(g.threads)}" target="_blank" rel="noopener">Threads ↗</a>` : "";
    const href = g.url ? esc(g.url) : "#";
    return `<article class="card" style="--c:${c};animation-delay:${i*35}ms">
      ${isNew ? '<span class="badge">NEW</span>' : ''}
      <div class="card__art"><span>${esc(g.emoji||"🎮")}</span></div>
      <div class="card__body">
        <h2 class="card__name"><a class="card__link" href="${href}">${esc(g.title)}</a></h2>
        ${g.desc ? `<p class="card__desc">${esc(g.desc)}</p>` : ""}
        <div class="card__meta">
          <span class="card__date">${esc(g.date||"")}</span>
          ${threads}
          <div class="card__tags">${tags}</div>
        </div>
      </div>
    </article>`;
  }).join("");
}

// 事件
$("#search").addEventListener("input", e => { state.q = e.target.value; render(); });
document.querySelectorAll(".sort button").forEach(b => b.addEventListener("click", () => {
  state.sort = b.dataset.sort;
  document.querySelectorAll(".sort button").forEach(x => x.setAttribute("aria-pressed", x===b));
  render();
}));
chips.addEventListener("click", e => {
  const b = e.target.closest(".chip"); if(!b) return;
  state.tag = b.dataset.tag;
  document.querySelectorAll(".chip").forEach(x => x.setAttribute("aria-pressed", x===b));
  render();
});

render();
</script>
</body>
</html>
